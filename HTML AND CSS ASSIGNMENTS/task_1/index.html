<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Design</title>

    <style>

        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f2f2f2;
        }

        /* Button Styling */
        button{
            padding: 15px 30px;
            font-size: 18px;

            background-color: blue;
            color: white;

            border: none;

            /* Rounded Corners */
            border-radius: 10px;

            /* Shadow Effect */
            box-shadow: 0px 4px 10px gray;

            cursor: pointer;

            transition: 0.3s;
        }

        /* Hover Effect */
        button:hover{
            background-color: darkblue;

            transform: scale(1.05);

            box-shadow: 0px 6px 15px black;
        }

    </style>
</head>
<body>

    <button>Click Me</button>

</body>
</html>
