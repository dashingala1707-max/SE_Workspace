<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Commerce Product Card</title>

  <!-- CSS File -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="product-card">

    <!-- Discount Badge -->
    <span class="badge">20% OFF</span>

    <!-- Product Image -->
    <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff"
    alt="Shoes">

    <!-- Product Details -->
    <div class="product-info">

      <h2>Nike Shoes</h2>

      <p class="price">$99</p>

      <p class="description">
        Stylish and comfortable shoes perfect for everyday use.
      </p>

      <!-- Button -->
      <button>Add to Cart</button>

    </div>

  </div>

</body>
</html>
