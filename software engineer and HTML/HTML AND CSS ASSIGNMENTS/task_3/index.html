<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Bar</title>

    <style>

        body{
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Navigation Bar */
        nav{
            background-color: #222;

            display: flex;
            justify-content: center;

            padding: 15px;
        }

        /* Navigation Links */
        nav a{
            color: white;
            text-decoration: none;

            margin: 0 20px;

            font-size: 18px;

            transition: 0.3s;
        }

        /* Hover Effect */
        nav a:hover{
            color: yellow;
        }

    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <nav>

        <a href="#">Home</a>

        <a href="#">About</a>

        <a href="#">Service</a>

        <a href="#">Contact</a>

    </nav>

</body>
</html>
