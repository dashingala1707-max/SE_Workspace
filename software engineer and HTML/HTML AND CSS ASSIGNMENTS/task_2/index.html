<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Design</title>

    <style>

        body{
            margin: 0;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            background-color: #f2f2f2;

            font-family: Arial, sans-serif;
        }

        /* Card Styling */
        .card{
            width: 300px;
            background-color: white;

            border-radius: 10px;

            overflow: hidden;

            box-shadow: 0px 4px 10px gray;

            text-align: center;
        }

        /* Image */
        .card img{
            width: 100%;
            height: 200px;

            object-fit: cover;
        }

        /* Content */
        .card-content{
            padding: 20px;
        }

        /* Title */
        .card h2{
            margin-bottom: 10px;
        }

        /* Description */
        .card p{
            color: #555;
            font-size: 15px;
        }

        /* Button */
        .card button{
            margin-top: 15px;
            padding: 10px 20px;

            border: none;
            border-radius: 5px;

            background-color: blue;
            color: white;

            cursor: pointer;

            transition: 0.3s;
        }

        /* Hover Effect */
        .card button:hover{
            background-color: darkblue;
            transform: scale(1.05);
        }

    </style>
</head>
<body>

    <div class="card">

        <!-- Image -->
        <img src="https://m.media-amazon.com/images/I/61pqCprUboL._AC_UF894,1000_QL80_.jpg" alt="Card Image">

        <!-- Content -->
        <div class="card-content">

            <h2>demons slayer </h2>

            <p>
                one of the most lovely anime and lots of prople love to see it tap on read more to know more about it.
            </p>

            <button>Read More</button>

        </div>

    </div>

</body>
</html>
